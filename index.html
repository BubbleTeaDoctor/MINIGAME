<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena Studio v0.9.0</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body class="landing-page">
<header class="landing-header">
  <div class="landing-chrome">
    <div class="lang-bar">
      <button data-lang-btn="zh">中文</button>
      <button data-lang-btn="en">English</button>
    </div>
    <div class="landing-brand">
      <p class="eyebrow">Arena Studio</p>
      <h1 data-i18n="index_title">无限制角斗场 Studio v0.9.0</h1>
      <p class="landing-lead" data-i18n="index_sub">从规则、卡组到实战，把一整套桌面式卡牌对战流程收拢到同一张桌面上。</p>
    </div>
  </div>
</header>

<main class="landing-shell">
  <section class="hero-panel panel">
    <div class="hero-copy">
      <div class="hero-note">Card combat sandbox</div>
      <p class="hero-lead">把规则、卡组和战斗节奏放到同一张牌桌上，像炉石一样清晰、热闹、可操作。</p>
      <div class="hero-actions">
        <button id="go-game" type="button" data-i18n="enter_game">进入对战</button>
        <button id="go-editor" type="button" class="secondary" onclick="location.href='editor.html'" data-i18n="open_editor">打开规则编辑器</button>
        <button id="go-deck-editor" type="button" class="secondary" onclick="location.href='deck_editor.html'">打开卡组编辑器</button>
      </div>
      <div class="hero-stats">
        <div class="hero-stat"><span>Rulesets</span><strong>可复制</strong></div>
        <div class="hero-stat"><span>Decks</span><strong>可构筑</strong></div>
        <div class="hero-stat"><span>Battle</span><strong>桌面式</strong></div>
      </div>
    </div>
    <aside class="hero-art">
      <div class="hero-card">
        <div class="hero-card-corner">Table Top</div>
        <div class="hero-card-emblem">✦</div>
        <p>木质、金边、暖色烛光，把你的系统包装成一场桌面卡牌对决。</p>
      </div>
    </aside>
  </section>

  <div id="deck-tooltip" class="deck-tooltip hidden" role="tooltip"></div>

  <section class="landing-grid">
    <section class="panel ruleset-panel">
      <div class="panel-head">
        <h2 data-i18n="rulesets">规则副本</h2>
        <div class="flex">
          <button id="btn-duplicate" data-i18n="duplicate_current">复制当前副本</button>
          <button id="btn-rename" class="secondary" data-i18n="rename">重命名</button>
          <button id="btn-delete" class="danger" data-i18n="delete_current">删除当前副本</button>
        </div>
      </div>
      <div id="ruleset-list" class="ruleset-list"></div>
    </section>

    <section class="panel storage-panel">
      <div class="panel-head"><h2>Storage</h2></div>
      <div class="grid landing-storage-grid">
        <label>
          <span>当前存储位置 / Current Storage</span>
          <div id="storage-info" class="summary-box" style="min-height:88px"></div>
        </label>
        <label>
          <span>存储命名空间 / Storage Namespace</span>
          <input id="storage-namespace" placeholder="例如 my_ruleset_slot" />
        </label>
        <div class="flex" style="align-items:end">
          <button id="btn-storage-apply" class="secondary">切换命名空间</button>
          <button id="btn-storage-folder" class="secondary">选择本地文件夹</button>
          <button id="btn-storage-reset" class="secondary">恢复默认存储</button>
        </div>
      </div>
      <p class="muted">浏览器版使用 LocalStorage，支持本地命名空间或文件夹工作区。桌面端建议使用 Chrome / Edge 打开后再切换工作区。</p>
    </section>
  </section>
</main>

<script src="studio_data.js"></script>
<script src="studio_patch_v080.js"></script>
<script src="studio_patch_v081.js"></script>
<script src="studio_patch_v083.js"></script>
<script src="studio_patch_v084.js"></script>
<script src="studio_patch_v085.js"></script>
<script src="studio_patch_v091.js"></script>
<script src="studio_patch_v092.js"></script>
<script src="studio_patch_v093.js"></script>
<script src="studio_patch_v094.js"></script>
<script src="studio_patch_v095.js"></script>
<script src="studio_patch_v096.js"></script>
<script src="studio_patch_v097.js"></script>
<script src="studio_patch_v099.js"></script>
<script src="studio_patch_v100.js"></script>
<script src="studio_patch_v101.js"></script>
<script src="studio_patch_v102.js"></script>
<script src="studio_patch_v104.js"></script>
<script src="studio_patch_v105.js"></script>
<script src="studio_patch_v106.js"></script>
<script src="studio_patch_v107.js"></script>
<script src="studio_patch_v108.js"></script>
<script src="studio_patch_v109.js"></script>
<script src="studio_patch_v111_default_ruleset.js"></script>
<script src="runtime.js"></script>
<script src="i18n_v081.js"></script>
<script>
const list = document.getElementById('ruleset-list');

function lang() {
  return window.STUDIO_I18N?.getLang?.() || 'zh';
}

function renderRulesets() {
  const active = STUDIO_RUNTIME.getActiveRulesetId();
  const rulesets = STUDIO_RUNTIME.loadRulesets();
  list.innerHTML = '';

  rulesets.forEach(rs => {
    const item = document.createElement('div');
    item.className = 'ruleset-item' + (rs.id === active ? ' active' : '');

    const kind = rs.id === STUDIO_RUNTIME.DEFAULT_ID
      ? (lang() === 'en' ? 'System Default' : '系统默认')
      : (lang() === 'en' ? 'Custom Ruleset' : '自定义规则副本');

    item.innerHTML = `
      <div>
        <div><strong>${rs.name}</strong></div>
        <div class="muted">${kind}</div>
      </div>
    `;

    const actions = document.createElement('div');
    actions.className = 'flex';

    const use = document.createElement('button');
    use.textContent = lang() === 'en' ? 'Use' : '设为当前';
    use.className = 'secondary';
    use.onclick = () => {
      STUDIO_RUNTIME.setActiveRulesetId(rs.id);
      renderRulesets();
      renderStorage();
    };

    actions.appendChild(use);
    item.appendChild(actions);
    list.appendChild(item);
  });
}

function renderStorage() {
  const info = STUDIO_RUNTIME.getStorageInfo();
  const host = document.getElementById('storage-info');
  if (host) {
    host.textContent = `Mode: ${info.mode}
Namespace: ${info.namespace}
Folder: ${info.folderName || '-'}
rulesets key: ${info.rulesetsKey}
active key: ${info.activeKey}`;
  }

  const input = document.getElementById('storage-namespace');
  if (input) input.value = info.isLegacy ? '' : (info.mode === 'localStorage' ? info.namespace : '');
}

document.getElementById('btn-duplicate').onclick = () => {
  const name = prompt(lang() === 'en' ? 'Duplicate name' : '副本名称', '');
  if (name !== null) {
    STUDIO_RUNTIME.duplicateRuleset(STUDIO_RUNTIME.getActiveRulesetId(), name || undefined);
    renderRulesets();
  }
};

document.getElementById('btn-rename').onclick = () => {
  const id = STUDIO_RUNTIME.getActiveRulesetId();
  const rs = STUDIO_RUNTIME.findRuleset(id);
  if (!rs.editable) return alert(lang() === 'en' ? 'Default ruleset cannot be renamed.' : '默认规则不能重命名。');
  const name = prompt(lang() === 'en' ? 'New name' : '新名称', rs.name);
  if (name) {
    STUDIO_RUNTIME.renameRuleset(id, name);
    renderRulesets();
  }
};

document.getElementById('btn-delete').onclick = () => {
  const id = STUDIO_RUNTIME.getActiveRulesetId();
  if (id === STUDIO_RUNTIME.DEFAULT_ID) return alert(lang() === 'en' ? 'Default ruleset cannot be deleted.' : '默认规则不能删除。');
  if (confirm(lang() === 'en' ? 'Delete current ruleset?' : '确认删除当前副本？')) {
    STUDIO_RUNTIME.deleteRuleset(id);
    renderRulesets();
  }
};

document.getElementById('go-game').onclick = () => location.href = 'game.html';
document.getElementById('btn-storage-apply').onclick = () => {
  const ns = (document.getElementById('storage-namespace').value || '').trim();
  if (!ns) return alert(lang() === 'en' ? 'Please enter a namespace.' : '请输入存储命名空间。');
  STUDIO_RUNTIME.switchStorageNamespace(ns, { copyCurrent: true });
  renderRulesets();
  renderStorage();
};

document.getElementById('btn-storage-folder').onclick = async () => {
  try {
    await STUDIO_RUNTIME.chooseWorkspaceFolder({ copyCurrent: true });
    renderRulesets();
    renderStorage();
    alert(lang() === 'en' ? 'Folder workspace selected.' : '已切换到本地文件夹工作区。');
  } catch (e) {
    const code = String(e && e.message || e);
    if (code.includes('unsupported')) alert(lang() === 'en' ? 'This browser does not support folder picker.' : '当前浏览器不支持文件夹选择。');
    else if (code.includes('denied')) alert(lang() === 'en' ? 'Folder permission denied.' : '未获得文件夹访问权限。');
  }
};

document.getElementById('btn-storage-reset').onclick = async () => {
  if (confirm(lang() === 'en' ? 'Reset to legacy default storage and copy current data?' : '恢复到默认存储并保留当前数据？')) {
    await STUDIO_RUNTIME.resetStorageToLegacy({ copyCurrent: true });
    renderRulesets();
    renderStorage();
  }
};

window.addEventListener('studio-language-changed', () => {
  renderRulesets();
  renderStorage();
});

(async () => {
  await STUDIO_RUNTIME.init();
  renderRulesets();
  renderStorage();
})();
</script>
</body>
</html>
