<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>无限制角斗场 v0.9.6 游戏页面壳</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, "Noto Sans SC", system-ui, sans-serif;
      background: #11161d;
      color: #eef2f7;
    }
    .page {
      display: grid;
      grid-template-columns: 320px 1fr 360px;
      gap: 16px;
      padding: 16px;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .panel {
      background: #1a212b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px;
      box-sizing: border-box;
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .line {
      font-size: 13px;
      margin-bottom: 6px;
      color: #c8d2df;
    }
    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: #c8d2df;
    }
    select, button {
      font: inherit;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0f141a;
      color: #eef2f7;
      padding: 10px 12px;
    }
    button {
      cursor: pointer;
      background: #255ea8;
      border: none;
    }
    button:hover {
      opacity: 0.92;
    }
    #board-panel {
      display: grid;
      grid-template-columns: repeat(13, minmax(34px, 1fr));
      gap: 4px;
      align-content: start;
    }
    .board-tile {
      min-height: 38px;
      padding: 0;
      font-size: 10px;
      border-radius: 8px;
      background: #202a35;
    }
    .board-tile[data-terrain="black_hole"] {
      background: #2f2144;
    }
    .board-tile[data-terrain="spike"] {
      background: #413226;
    }
    .board-tile[data-overlay="reachable_tiles"],
    .board-tile[data-overlay="attack_targets"],
    .board-tile[data-overlay="castable_tiles_with_radius_preview"],
    .board-tile[data-overlay="attack_targets_with_landing_preview"] {
      outline: 2px solid #7cc4ff;
    }
    .board-tile[data-occupant="P1"] {
      box-shadow: inset 0 0 0 2px #66d48f;
    }
    .board-tile[data-occupant="P2"] {
      box-shadow: inset 0 0 0 2px #ff8f7a;
    }
    #hand-panel {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .hand-card {
      width: 100%;
      text-align: left;
      background: #243140;
      border-radius: 12px;
      padding: 10px;
    }
    .card-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-source, .card-template, .card-badge {
      font-size: 12px;
      color: #c8d2df;
      margin-bottom: 4px;
    }
    #mode-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .mode-btn {
      background: #4a2f7b;
    }
    #log-panel {
      max-height: 300px;
      overflow: auto;
      display: grid;
      gap: 6px;
    }
    .log-row {
      font-size: 12px;
      color: #d7dfeb;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 6px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      align-items: center;
    }
    .status-box {
      display: grid;
      gap: 8px;
    }
    @media (max-width: 1300px) {
      .page {
        grid-template-columns: 1fr;
      }
      #board-panel {
        grid-template-columns: repeat(13, minmax(24px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="section-title">开局设置</div>
      <div class="controls-grid">
        <label>
          玩家 1 职业
          <select id="p1-profession"></select>
        </label>
        <label>
          玩家 2 职业
          <select id="p2-profession"></select>
        </label>
        <label>
          玩家 1 武器
          <select id="p1-weapon"></select>
        </label>
        <label>
          玩家 2 武器
          <select id="p2-weapon"></select>
        </label>
        <label>
          玩家 1 饰品
          <select id="p1-accessory"></select>
        </label>
        <label>
          玩家 2 饰品
          <select id="p2-accessory"></select>
        </label>
      </div>
      <button id="btn-start-game" type="button">开始游戏</button>

      <div style="height: 16px"></div>
      <div class="section-title">玩家状态</div>
      <div id="panel-p1" class="status-box"></div>
      <div style="height: 12px"></div>
      <div id="panel-p2" class="status-box"></div>
    </div>

    <div class="panel">
      <div class="top-bar">
        <div>
          <div id="turn-indicator" class="line">回合信息</div>
          <div id="winner-indicator" class="line"></div>
        </div>
        <button id="btn-end-turn" type="button">结束回合</button>
      </div>

      <div class="section-title">战场</div>
      <div id="board-panel"></div>

      <div style="height: 16px"></div>
      <div class="section-title">当前手牌</div>
      <div id="hand-panel"></div>

      <div id="mode-buttons"></div>
    </div>

    <div class="panel">
      <div class="section-title">高亮与日志</div>
      <div id="overlay-panel" class="status-box"></div>
      <div style="height: 16px"></div>
      <div id="log-panel"></div>
    </div>
  </div>

</html>
